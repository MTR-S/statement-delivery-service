version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    ports:
      - "8081:8080"
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_API_KEY=${WHATSAPP_KEY}
      - DATABASE_PROVIDER=postgresql
    restart: always

  statement-bot:
    build: .
    container_name: statement-delivery-bot
    depends_on:
      - evolution-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_MAIL_HOST=imap.gmail.com
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_CODE}

      - WHATSAPP_API_URL=http://evolution-api:8080
      - WHATSAPP_API_INSTANCE=${WHATSAPP_INSTANCE}
      - WHATSAPP_API_KEY=${WHATSAPP_KEY}

      - USER_PHONE=${USER_PHONE}

      - TZ=America/Fortaleza
    restart: unless-stopped